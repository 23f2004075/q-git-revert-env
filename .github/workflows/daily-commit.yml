name: Daily Repository Update

on:
  schedule:
    - cron: '30 10 * * *'   # Runs daily at 10:30 UTC (specific time, no wildcards)
  workflow_dispatch:        # Allows manual trigger

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config user.name "DevSync Automation"
          git config user.email "23f2004075@ds.study.iitm.ac.in"

      - name: 23f2004075@ds.study.iitm.ac.in - Create Daily Commit
        run: |
          echo "Last updated on $(date)" >> daily_update.txt
          git add daily_update.txt
          git commit -m "Automated daily update on $(date)" || echo "No changes to commit"
          git push
